<!DOCTYPE html>
<html>
<head><title>Engine Test Runner</title></head>
<body>
<pre id="result">Waiting for test config...</pre>
<script type="module">
import { EngineProxy } from '/src/engine-proxy.ts';

/*
 * Engine E2E test runner.
 *
 * Config shape:
 * {
 *   width: 64, height: 64,
 *   commands: [...],           // initial commands
 *   waitFrames: 10,
 *   captureTraceIds: [...],
 *   // OR multi-phase:
 *   phases: [
 *     { commands: [...], waitFrames: 10, captureTraceIds: ['a'] },
 *     { commands: [...], waitFrames: 5, captureTraceIds: ['b'] },
 *   ]
 * }
 *
 * Output:
 * {
 *   success: true,
 *   // single-phase: tracedFrames at top level
 *   tracedFrames: { 'a': { width, height, pixelsBase64 } },
 *   // multi-phase: phases array
 *   phases: [
 *     { tracedFrames: { 'a': {...} } },
 *     { tracedFrames: { 'b': {...} } },
 *   ],
 *   state: { plugins, sketches },
 * }
 */

async function sendCommands(engine, commands) {
  for (const cmd of commands) {
    switch (cmd.type) {
      case 'loadModule': engine.loadModule(cmd.moduleType); break;
      case 'instantiateEffect': engine.instantiateEffect(cmd.effectId); break;
      case 'createSketch': engine.createSketch(cmd.sketchId, cmd.sketch); break;
      case 'updateSketch': engine.updateSketch(cmd.sketchId, cmd.sketch); break;
      case 'setParam': engine.setParam(cmd.sketchId, cmd.colIdx, cmd.chainIdx, cmd.paramKey, cmd.value); break;
      case 'setTracePoints': engine.setTracePoints(cmd.tracePoints); break;
    }
    await new Promise(r => setTimeout(r, 50));
  }
}

async function waitForFrames(engine, count) {
  let received = 0;
  let lastFrames = null;
  let lastSketchState = null;
  await new Promise((resolve, reject) => {
    const timeout = setTimeout(() => reject(new Error(`Timeout waiting for ${count} frames`)), 15000);
    engine.onTracedFrames = (frames) => {
      lastFrames = frames;
      received++;
      if (received >= count) { clearTimeout(timeout); resolve(undefined); }
    };
    engine.onSketchState = (state) => { lastSketchState = state; };
  });
  return { lastFrames, lastSketchState };
}

async function captureFrames(lastTracedFrames, captureIds) {
  const ids = captureIds || Object.keys(lastTracedFrames || {});
  const out = {};
  for (const traceId of ids) {
    const bitmap = lastTracedFrames?.[traceId];
    if (!bitmap) { out[traceId] = null; continue; }
    const tmpCanvas = new OffscreenCanvas(bitmap.width, bitmap.height);
    const ctx2d = tmpCanvas.getContext('2d');
    ctx2d.drawImage(bitmap, 0, 0);
    const imageData = ctx2d.getImageData(0, 0, bitmap.width, bitmap.height);
    const pixels = imageData.data;
    const chunks = [];
    for (let i = 0; i < pixels.length; i += 8192) {
      chunks.push(String.fromCharCode.apply(null, pixels.subarray(i, Math.min(i + 8192, pixels.length))));
    }
    out[traceId] = { width: bitmap.width, height: bitmap.height, pixelsBase64: btoa(chunks.join('')) };
    bitmap.close();
  }
  return out;
}

async function run() {
  const resultEl = document.getElementById('result');
  resultEl.textContent = 'Running...';

  const config = window.__engineTestConfig;
  if (!config) {
    resultEl.textContent = JSON.stringify({ success: false, error: 'No config' });
    return;
  }

  const W = config.width || 64;
  const H = config.height || 64;

  try {
    const engine = new EngineProxy(W, H);

    let lastState = null;
    engine.onStateUpdate = (state) => { lastState = state; };
    engine.onTracedFrames = () => {};

    // Wait for ready
    await new Promise((resolve, reject) => {
      const timeout = setTimeout(() => reject(new Error('Engine init timeout')), 10000);
      engine.onError = (msg) => { clearTimeout(timeout); reject(new Error(msg)); };
      const check = setInterval(() => {
        if (engine.ready) { clearInterval(check); clearTimeout(timeout); resolve(undefined); }
      }, 50);
    });

    // Multi-phase or single-phase
    const phases = config.phases || [{
      commands: config.commands || [],
      waitFrames: config.waitFrames || 10,
      captureTraceIds: config.captureTraceIds,
    }];

    const phaseResults = [];
    for (const phase of phases) {
      await sendCommands(engine, phase.commands || []);
      const { lastFrames, lastSketchState } = await waitForFrames(engine, phase.waitFrames || 10);
      const traced = await captureFrames(lastFrames, phase.captureTraceIds);
      phaseResults.push({ tracedFrames: traced, sketchState: lastSketchState });
    }

    engine.destroy();

    const output = { success: true, state: lastState };
    if (config.phases) {
      output.phases = phaseResults;
    } else {
      output.tracedFrames = phaseResults[0]?.tracedFrames || {};
      output.sketchState = phaseResults[0]?.sketchState || {};
    }

    resultEl.textContent = JSON.stringify(output);
  } catch (e) {
    resultEl.textContent = JSON.stringify({ success: false, error: String(e), stack: e.stack });
  }
}

window.__engineTestRun = run;
</script>
</body>
</html>
