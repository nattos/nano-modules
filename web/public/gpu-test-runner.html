<!DOCTYPE html>
<html>
<head><title>GPU Test Runner</title></head>
<body>
<pre id="result">Waiting for test config...</pre>
<script type="module">
import { GPUHost } from '/src/gpu-host.ts';
import { WasmHost } from '/src/wasm-host.ts';

/*
 * Generic GPU module test runner.
 *
 * Config shape (single module):
 * {
 *   module: "gpu_test.wasm",
 *   width: 64, height: 64,
 *   params: [[0, 0.5], [1, 1.0]],
 *   ticks: 1,
 *   samplePoints: [[32,32]],
 *   inputColor: [r, g, b, a],  // optional: create solid input texture
 * }
 *
 * Config shape (chain):
 * {
 *   chain: [
 *     { module: "spinningtris.wasm", params: [[0, 0.5]], ticks: 5 },
 *     { module: "brightness_contrast.wasm", params: [[1, 0.25]] },
 *   ],
 *   width: 64, height: 64,
 *   samplePoints: [[32,32]],
 * }
 */

function normalizePath(mod) {
  return mod.startsWith('wasm/') ? mod : 'wasm/' + mod;
}

async function run() {
  const resultEl = document.getElementById('result');
  resultEl.textContent = 'Running...';

  const config = window.__gpuTestConfig || (() => {
    const p = new URLSearchParams(window.location.search);
    return {
      module: p.get('module') || 'gpu_test.wasm',
      width: parseInt(p.get('width') || '64'),
      height: parseInt(p.get('height') || '64'),
      params: JSON.parse(p.get('params') || '[]'),
      ticks: parseInt(p.get('ticks') || '0'),
      samplePoints: JSON.parse(p.get('samples') || '[]'),
    };
  })();

  const W = config.width || 64;
  const H = config.height || 64;

  try {
    const adapter = await navigator.gpu?.requestAdapter();
    if (!adapter) throw new Error('No GPU adapter');
    const device = await adapter.requestDevice();
    const format = 'rgba8unorm';
    const texUsage = GPUTextureUsage.RENDER_ATTACHMENT | GPUTextureUsage.TEXTURE_BINDING
                   | GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.COPY_SRC
                   | GPUTextureUsage.COPY_DST;

    const gpuHost = new GPUHost(device, format);

    // Build chain: either explicit chain config, or single module
    const steps = config.chain || [{
      module: config.module,
      params: config.params,
      ticks: config.ticks,
    }];

    // Create textures for ping-pong between steps
    const texA = device.createTexture({ size: [W, H], format, usage: texUsage });
    const texB = device.createTexture({ size: [W, H], format, usage: texUsage });
    let currentOutput = texA;
    let nextOutput = texB;

    // If inputColor is provided, fill the first texture with that color
    if (config.inputColor) {
      const [r, g, b, a] = config.inputColor;
      const pixelData = new Uint8Array(W * H * 4);
      for (let i = 0; i < W * H; i++) {
        pixelData[i * 4 + 0] = Math.round(r * 255);
        pixelData[i * 4 + 1] = Math.round(g * 255);
        pixelData[i * 4 + 2] = Math.round(b * 255);
        pixelData[i * 4 + 3] = Math.round((a !== undefined ? a : 1) * 255);
      }
      device.queue.writeTexture(
        { texture: currentOutput },
        pixelData,
        { bytesPerRow: W * 4 },
        { width: W, height: H },
      );
    }

    let lastHost = null;
    let allConsoleLogs = [];

    for (let si = 0; si < steps.length; si++) {
      const step = steps[si];

      // Set up surface for this step's output
      gpuHost.setSurface(nextOutput, W, H);

      const wasmHost = new WasmHost();
      wasmHost.gpuHost = gpuHost;

      // If this is NOT the first step (or inputColor is set), inject previous output as input
      if (si > 0 || config.inputColor) {
        const inputHandle = gpuHost.injectTexture(currentOutput);
        wasmHost.inputTextureHandles = [inputHandle];
        // Populate textureFields for unified texture access
        wasmHost.textureFields.set('tex_in', inputHandle);
      }
      // Set output texture field
      const outputHandle = gpuHost.injectTexture(nextOutput);
      wasmHost.textureFields.set('tex_out', outputHandle);

      const wasmModule = await wasmHost.load(normalizePath(step.module));
      wasmModule.init();

      // Set parameters
      if (step.params) {
        for (const [index, value] of step.params) {
          wasmHost.frameState.params[index] = value;
          wasmModule.onParamChange(index, value);
        }
      }

      wasmHost.frameState.viewportW = W;
      wasmHost.frameState.viewportH = H;
      wasmHost.frameState.bpm = 120;

      const tickCount = step.ticks || 0;
      for (let i = 0; i < tickCount; i++) {
        wasmHost.frameState.elapsedTime = (i + 1) * 0.016;
        wasmHost.frameState.deltaTime = 0.016;
        wasmHost.frameState.barPhase = ((i + 1) * 0.016 * 120 / 60 / 4) % 1.0;
        wasmModule.tick(0.016);
      }

      wasmModule.render(W, H);
      allConsoleLogs.push(...wasmHost.consoleLogs.map(l => l.message));
      lastHost = wasmHost;

      // Swap: this step's output becomes next step's input
      const tmp = currentOutput;
      currentOutput = nextOutput;
      nextOutput = tmp;
    }

    // currentOutput has the final result
    const finalHandle = gpuHost.injectTexture(currentOutput);
    const pixels = await gpuHost.readbackTexture(finalHandle, W, H);

    const points = (config.samplePoints && config.samplePoints.length > 0)
      ? config.samplePoints
      : [[W/2, H/2], [0, 0], [W-1, 0], [0, H-1], [W-1, H-1]];

    const samples = points.map(([x, y]) => {
      x = Math.floor(x); y = Math.floor(y);
      const o = (y * W + x) * 4;
      return { x, y, r: pixels[o], g: pixels[o+1], b: pixels[o+2], a: pixels[o+3] };
    });

    let pixelsBase64 = '';
    if (config.dumpPixels !== false) {
      const chunks = [];
      for (let i = 0; i < pixels.length; i += 8192) {
        chunks.push(String.fromCharCode.apply(null, pixels.subarray(i, Math.min(i + 8192, pixels.length))));
      }
      pixelsBase64 = btoa(chunks.join(''));
    }

    resultEl.textContent = JSON.stringify({
      success: true,
      width: W, height: H,
      pixelCount: pixels.length / 4,
      samples, pixelsBase64,
      consoleLog: allConsoleLogs,
      pluginState: lastHost?.pluginState ?? {},
      metadata: lastHost?.metadata ?? null,
      params: lastHost?.params ?? [],
    }, null, 2);
  } catch (e) {
    resultEl.textContent = JSON.stringify({ success: false, error: String(e), stack: e.stack }, null, 2);
  }
}

window.__gpuTestRun = run;
if (window.__gpuTestConfig) {
  run();
} else if (new URLSearchParams(window.location.search).has('module')) {
  run();
}
</script>
</body>
</html>
