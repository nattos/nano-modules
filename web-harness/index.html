<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NanoLooper WASM Harness</title>
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <div id="main-layout">
    <div id="canvas-container">
      <canvas id="canvas"></canvas>
      <div id="status">Loading...</div>
      <div id="legend">
        <span><b>1-4</b> Trigger</span>
        <span><b>D</b> Delete</span>
        <span><b>M</b> Mute</span>
        <span><b>Z</b> Undo</span>
        <span><b>X</b> Redo</span>
        <span><b>R</b> Record</span>
        <span><b>S</b> Synth</span>
      </div>
    </div>
    <div id="side-panel">
      <div id="panel-metadata" class="panel-section">
        <div class="panel-header">Plugin</div>
        <div id="metadata-content" class="panel-body">--</div>
      </div>
      <div id="panel-state" class="panel-section">
        <div class="panel-header">
          State
          <button id="state-edit-btn" class="panel-btn">Edit</button>
        </div>
        <pre id="state-content" class="panel-body panel-json">{ }</pre>
        <div id="state-editor" class="panel-body" style="display:none">
          <textarea id="state-textarea" spellcheck="false"></textarea>
          <div class="editor-actions">
            <button id="state-apply-btn" class="panel-btn">Apply</button>
            <button id="state-cancel-btn" class="panel-btn">Cancel</button>
          </div>
        </div>
      </div>
      <div id="panel-console" class="panel-section panel-grow">
        <div class="panel-header">Console</div>
        <div id="console-content" class="panel-body panel-scroll"></div>
      </div>
    </div>
  </div>
  <script type="module" src="src/main.ts"></script>
</body>
</html>
